name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate pattern files
        run: node scripts/check-patterns.js

      - name: Run pattern tests
        run: node tests/test-patterns.js

      - name: Test CLI scan (should detect secrets in fixture)
        run: |
          node bin/leash-secrets.js scan tests/fixtures/has-secrets.py && exit 1 || true

      - name: Test CLI scan (should pass on clean fixture)
        run: node bin/leash-secrets.js scan tests/fixtures/clean.py

  shellcheck:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check install script syntax
        run: bash -n scripts/install.sh

      - name: Check pre-commit hook syntax
        run: bash -n hooks/pre-commit.sh

  dogfood:
    name: Dogfood (Scan Own Repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan repo for real secrets (excluding test fixtures and docs)
        run: |
          node bin/leash-secrets.js scan src/ scripts/ hooks/ bin/ --json > /tmp/findings.json 2>&1 || true
          CRITICALS=$(node -e "const f=require('/tmp/findings.json');console.log(f.filter(x=>x.severity==='critical').length)" 2>/dev/null || echo "0")
          if [ "$CRITICALS" != "0" ]; then
            echo "::error::Found $CRITICALS critical secrets in source code"
            cat /tmp/findings.json
            exit 1
          fi
          echo "No critical secrets found in source code."

  vscode-extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package extension (dry run)
        run: npm run package-extension

      - name: Verify patterns bundled in VSIX
        run: |
          test -f vscode-extension/patterns/index.json
          PATTERN_FILES=$(node -e "console.log(require('./vscode-extension/patterns/index.json').pattern_files.length)")
          test "$PATTERN_FILES" -eq 11
          echo "Bundled $PATTERN_FILES pattern files"
