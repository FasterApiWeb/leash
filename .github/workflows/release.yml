name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate before publish
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  upload-assets:
    name: Upload Release Assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package skill files
        run: |
          VERSION=${{ needs.release-please.outputs.version }}
          tar -czf leash-secrets-${VERSION}.tar.gz \
            skills/ patterns/ hooks/ src/ bin/ \
            AGENTS.md .cursor/rules/leash-secrets.mdc .github/copilot-instructions.md \
            package.json README.md LICENSE
          zip -r leash-secrets-${VERSION}.zip \
            skills/ patterns/ hooks/ src/ bin/ \
            AGENTS.md .cursor/rules/leash-secrets.mdc .github/copilot-instructions.md \
            package.json README.md LICENSE

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.release-please.outputs.version }}
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            leash-secrets-${VERSION}.tar.gz \
            leash-secrets-${VERSION}.zip
